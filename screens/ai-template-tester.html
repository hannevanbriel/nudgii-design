<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nudgii · AI template tester · all 96 items</title>
<link rel="stylesheet" href="../system/components.css">
<link rel="stylesheet" href="../system/tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#CBC5BB;font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:270px;background:var(--surface);border-right:1px solid rgba(44,40,36,0.08);display:flex;flex-direction:column;height:100vh;flex-shrink:0;overflow:hidden;}
.sidebar-head{padding:16px 16px 12px;border-bottom:1px solid rgba(44,40,36,0.06);}
.sidebar-head h1{font-family:'DM Serif Display',Georgia,serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:6px;}
.sidebar-head p{font-size:10px;color:var(--mid);line-height:1.5;}

.sidebar-controls{padding:12px 16px;border-bottom:1px solid rgba(44,40,36,0.06);display:flex;flex-direction:column;gap:8px;}
.search-box{width:100%;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:11px;border:1px solid rgba(44,40,36,0.10);border-radius:8px;background:var(--surface-low);color:var(--ink);outline:none;}
.search-box:focus{border-color:var(--plum);}
.search-box::placeholder{color:var(--hint);}

.cat-chips{display:flex;flex-wrap:wrap;gap:4px;}
.cat-chip{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;padding:4px 10px;border-radius:100px;border:1px solid rgba(44,40,36,0.10);background:transparent;color:var(--mid);cursor:pointer;transition:all 120ms;}
.cat-chip:hover{border-color:rgba(44,40,36,0.20);}
.cat-chip.active{color:white;border-color:transparent;}
.cat-chip[data-cat="all"].active{background:var(--plum);}
.cat-chip[data-cat="home"].active{background:#C09088;}
.cat-chip[data-cat="garden"].active{background:#8C9B80;}
.cat-chip[data-cat="vehicle"].active{background:#8E9A94;}
.cat-chip[data-cat="subscriptions"].active{background:#A69BBF;}
.cat-chip[data-cat="health"].active{background:#C29494;}
.cat-chip[data-cat="pets"].active{background:#C7B7A3;}

.theme-row{display:flex;align-items:center;gap:6px;}
.theme-label{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--hint);}
.theme-btn{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid rgba(44,40,36,0.10);background:transparent;color:var(--mid);cursor:pointer;}
.theme-btn.on{background:var(--plum);color:white;border-color:var(--plum);}

.sidebar-list{flex:1;overflow-y:auto;scrollbar-width:thin;}
.sidebar-list::-webkit-scrollbar{width:4px;}
.sidebar-list::-webkit-scrollbar-thumb{background:rgba(44,40,36,0.12);border-radius:2px;}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background 100ms;}
.item-row:hover{background:rgba(44,40,36,0.03);}
.item-row.active{background:rgba(155,127,212,0.08);}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.item-label{font-size:11px;font-weight:500;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-cat-label{font-size:8px;color:var(--hint);flex-shrink:0;text-transform:uppercase;letter-spacing:0.5px;}
.item-count{font-size:10px;color:var(--mid);padding:2px 6px;background:var(--surface-low);border-radius:4px;margin-top:8px;text-align:center;font-weight:500;}
.cat-section-label{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--hint);padding:12px 16px 4px;position:sticky;top:0;background:var(--surface);z-index:1;}

/* ── Main area ── */
.main{flex:1;display:flex;gap:32px;justify-content:center;align-items:flex-start;padding:32px;overflow-y:auto;}

/* ── Phone frame (shared CSS from components.css .phone) ── */
.scr{display:flex;flex-direction:column;flex:1;overflow:hidden;background:var(--surface);}
.scr-scroll{flex:1;overflow-y:auto;scrollbar-width:none;}
.scr-scroll::-webkit-scrollbar{display:none;}

/* ── Add Item Review screen ── */
.air-hero{position:relative;height:140px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.air-hero-icon{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.45);display:flex;align-items:center;justify-content:center;}
.air-nav{position:absolute;top:10px;left:16px;}
.air-nav-btn{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.65);display:flex;align-items:center;justify-content:center;}
.air-id{padding:16px 20px 0;}
.air-name{font-family:'DM Serif Display',Georgia,serif;font-size:22px;font-weight:400;color:var(--ink);display:flex;align-items:center;gap:8px;}
.air-edit-icon{opacity:0.25;}
.air-meta{font-size:11px;color:var(--mid);margin-top:3px;}
.air-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:500;color:var(--plum);background:var(--plum-wash);padding:3px 10px;border-radius:100px;margin-top:8px;}
.air-badge svg{width:10px;height:10px;}

.air-task{margin:0 16px 8px;background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.air-task-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.air-task-body{flex:1;min-width:0;}
.air-task-name{font-size:13px;font-weight:500;color:var(--ink);}
.air-task-cadence{font-size:10px;color:var(--mid);margin-top:1px;}
.air-task-cost{font-size:9px;color:var(--hint);flex-shrink:0;}

.nudge-preview{margin:12px 16px;padding:14px;background:var(--apricot-wash);border-radius:12px;border:0.5px solid rgba(232,168,124,0.12);}
.nudge-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--apricot);margin-bottom:6px;}
.nudge-text{font-size:12px;color:var(--ink);line-height:1.5;}
.nudge-task{font-weight:500;}

.nickname-row{margin:14px 16px 0;display:flex;align-items:center;gap:8px;}
.nickname-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;background:var(--surface-low);border:0.5px solid rgba(44,40,36,0.06);font-size:11px;color:var(--ink);}
.nickname-chip .name{font-weight:500;color:var(--plum);}

.air-bottom{position:absolute;bottom:0;left:0;right:0;padding:12px 20px 28px;background:linear-gradient(to top,var(--surface) 70%,transparent);}
.air-cta{width:100%;padding:14px;border-radius:14px;background:var(--plum);color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;text-align:center;box-shadow:0 4px 16px rgba(155,127,212,0.35);}

/* ── Cost hero (subscriptions) ── */
.cost-hero{text-align:center;padding:10px 20px 0;}
.cost-value{font-family:'DM Serif Display',Georgia,serif;font-size:28px;font-weight:400;color:var(--ink);}
.cost-period{font-size:10px;color:var(--mid);margin-top:2px;}
.cost-sub{font-size:9px;color:var(--hint);margin-top:4px;font-style:italic;}

/* ── S-17 Detail ── */
.s17-hero{position:relative;height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.s17-hero-icon{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.45);display:flex;align-items:center;justify-content:center;}
.s17-hero-nav{position:absolute;top:10px;left:16px;right:16px;display:flex;justify-content:space-between;}
.hero-btn{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.65);display:flex;align-items:center;justify-content:center;}
.hero-add-photo{font-size:9px;opacity:0.7;}

.item-id{padding:16px 20px 0;}
.item-name{font-family:'DM Serif Display',Georgia,serif;font-size:24px;font-weight:400;line-height:1.1;letter-spacing:-0.02em;color:var(--ink);}
.item-meta{font-size:11px;color:var(--mid);margin-top:4px;}
.ai-source{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--plum);background:var(--plum-wash);padding:2px 8px;border-radius:100px;margin-top:6px;}

.stats-row{display:flex;gap:8px;padding:14px 20px 0;}
.stat-box{flex:1;background:var(--surface-low);border-radius:12px;padding:10px 6px;text-align:center;border:0.5px solid rgba(44,40,36,0.06);}
.stat-val{font-family:'DM Serif Display',Georgia,serif;font-size:18px;font-weight:400;color:var(--ink);}
.stat-label{font-size:7.5px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--mid);margin-top:2px;}

.status-strip{display:flex;align-items:center;gap:8px;margin:12px 20px 0;padding:9px 14px;background:var(--surface-low);border-radius:10px;}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.status-text{font-size:11px;color:var(--ink);flex:1;}
.status-next{font-size:10px;color:var(--mid);}

.sec-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;}
.sec-title{font-family:'DM Serif Display',Georgia,serif;font-size:16px;font-weight:400;color:var(--ink);}
.sec-action{font-size:10px;font-weight:500;color:var(--plum);display:flex;align-items:center;gap:4px;}

.task-card{margin:0 16px 8px;background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:14px;overflow:hidden;}
.task-row{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;}
.task-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:13px;font-weight:500;color:var(--ink);line-height:1.3;}
.task-sub{font-size:10px;color:var(--mid);margin-top:1px;}
.task-badge{font-size:9px;font-weight:500;flex-shrink:0;color:var(--mid);}
.task-chev{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.3;transition:transform 200ms ease;}
.task-chev.open{transform:rotate(180deg);}
.task-expand{max-height:0;overflow:hidden;transition:max-height 350ms ease;}
.task-expand-inner{padding:0 14px 14px;}
.task-why{background:rgba(232,168,124,0.06);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.task-why-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--apricot);margin-bottom:4px;}
.task-why-text{font-size:11px;color:var(--ink);line-height:1.6;}
.task-actions{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid rgba(44,40,36,0.06);}
.ta-skip{font-size:10px;color:var(--hint);padding:6px 10px;margin-right:auto;}
.ta-snooze{font-size:10px;font-weight:500;color:var(--ink);padding:7px 14px;border-radius:100px;background:var(--surface-low);}
.ta-done{font-size:10px;font-weight:500;color:white;padding:7px 16px;border-radius:100px;background:var(--plum);display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(155,127,212,0.25);}

.detail-card{margin:0 16px;background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;overflow:hidden;}
.detail-row2{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:0.5px solid rgba(44,40,36,0.04);}
.detail-row2:last-child{border-bottom:none;}

/* ── Appointment badge (Health) ── */
.appt-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:500;color:var(--apricot);background:rgba(232,168,124,0.10);padding:3px 10px;border-radius:100px;margin-top:6px;}

.bottom-spacer{height:40px;}

/* ── Dark mode ── */
[data-theme="dark"] .phone{background:#1C1B18;box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 24px 80px rgba(0,0,0,0.5);}
[data-theme="dark"] .scr{background:var(--surface);}
[data-theme="dark"] .notch .np{background:rgba(255,255,255,0.08);}
[data-theme="dark"] .sbar span{color:#F0EDE6;}
[data-theme="dark"] .sbar .batt{background:#F0EDE6;}
[data-theme="dark"] .air-hero-icon,[data-theme="dark"] .s17-hero-icon{background:rgba(255,255,255,0.10);}
[data-theme="dark"] .hero-btn,[data-theme="dark"] .air-nav-btn{background:rgba(255,255,255,0.10);}
[data-theme="dark"] .air-task,[data-theme="dark"] .task-card{background:var(--surface-high);border-color:rgba(255,255,255,0.06);}
[data-theme="dark"] .nudge-preview{background:rgba(240,184,144,0.08);border-color:rgba(240,184,144,0.10);}
[data-theme="dark"] .nickname-chip{background:var(--surface-high);border-color:rgba(255,255,255,0.06);}
[data-theme="dark"] .air-bottom{background:linear-gradient(to top,var(--surface) 70%,transparent);}
[data-theme="dark"] .stat-box{background:var(--surface-high);border-color:rgba(255,255,255,0.06);}
[data-theme="dark"] .status-strip{background:var(--surface-high);}
[data-theme="dark"] .task-why{background:rgba(240,184,144,0.06);}
[data-theme="dark"] .task-actions{border-color:rgba(255,255,255,0.06);}
[data-theme="dark"] .ta-snooze{background:var(--surface-low);}
[data-theme="dark"] .detail-card{background:var(--surface-high);border-color:rgba(255,255,255,0.06);}
[data-theme="dark"] .detail-row2{border-color:rgba(255,255,255,0.04);}

/* ── Responsive: hide sidebar on small screens ── */
@media(max-width:900px){.sidebar{display:none;}.main{padding:16px;}}
</style>
</head>
<body>

<!-- ════════════════════ SIDEBAR ════════════════════ -->
<div class="sidebar">
  <div class="sidebar-head">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">

  <div class="sidebar-list" id="itemList"></div>
</div>

<!-- ════════════════════ PHONES ════════════════════ -->
<div class="main">

  <div>

        </div>
      </div>
    </div>

  <!-- RIGHT PHONE: S-17 Detail -->
  <div>
    <div style="font-size:9px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#8A8070;margin-bottom:10px;text-align:center;">S-17 item detail</div>

      <div class="scr">
        <div class="scr-scroll" id="detail-scroll"></div>
      </div>
    </div>
  </div>

</div>

// ── State ──
let currentCat = "all";
let currentItem = null;
let currentTheme = "light";

// ── Build sidebar ──
function buildSidebar() {
  const list = document.getElementById('itemList');
  const q = document.getElementById('search').value.toLowerCase();
  list.innerHTML = '';
  let lastCat = '';
  let count = 0;
  ITEMS.forEach((item, i) => {
    if (currentCat !== 'all' && item.cat !== currentCat) return;
    if (q && !item.name.toLowerCase().includes(q) && !item.slug.includes(q)) return;
    if (item.cat !== lastCat) {
      list.innerHTML += '<div class="cat-section-label">' + CAT[item.cat].label + '</div>';
      lastCat = item.cat;
    }
    const isActive = currentItem === i ? ' active' : '';
    list.innerHTML += '<div class="item-row' + isActive + '" onclick="selectItem(' + i + ')">' +
      '<div class="item-dot" style="background:' + CAT[item.cat].color + '"></div>' +
      '<div class="item-label">' + item.name + '</div>' +
      '<div class="item-cat-label">' + item.tasks.length + ' tasks</div>' +
      '</div>';
    count++;
  });
  list.innerHTML += '<div class="item-count">' + count + ' items</div>';
}

function filterItems() { buildSidebar(); }

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.cat-chip[data-cat="' + cat + '"]').classList.add('active');
  buildSidebar();
}

function setTheme(t) {
  currentTheme = t;
  document.getElementById('phone-left').setAttribute('data-theme', t);
  document.getElementById('phone-right').setAttribute('data-theme', t);
  document.getElementById('tl').classList.toggle('on', t === 'light');
  document.getElementById('td').classList.toggle('on', t === 'dark');
}

// ── Select item and render both phones ──
function selectItem(idx) {
  currentItem = idx;
  buildSidebar();
  const item = ITEMS[idx];
  const cat = CAT[item.cat];
  renderReview(item, cat);
  renderDetail(item, cat);
}

function svgArrow() {
  return '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="' + (currentTheme === 'dark' ? '#F0EDE6' : '#2C2824') + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6H2"/><path d="M5 3L2 6L5 9"/></svg>';

function svgChev() {
  return '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="var(--mid)" stroke-width="1.5" stroke-linecap="round"><path d="M3 4.5L6 7.5L9 4.5"/></svg>';
}

// Skip return date logic: interval ≤ 1 month = push by full interval. > 1 month = push by 1 month.
function getSkipDate(cadence) {
  const c = cadence.toLowerCase();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  let d = new Date(now);
  if (c.includes('weekly') || c.includes('week')) { d.setDate(d.getDate() + 7); return months[d.getMonth()] + ' ' + d.getDate(); }
  if (c.includes('monthly') || c.includes('month') && !c.includes('2') && !c.includes('3') && !c.includes('6')) { d.setMonth(d.getMonth() + 1); return months[d.getMonth()] + ' ' + d.getDate(); }
  if (c.includes('every 2') && c.includes('month')) { d.setMonth(d.getMonth() + 1); return months[d.getMonth()] + ' ' + d.getDate(); }
  if (c.includes('every 3') && c.includes('month')) { d.setMonth(d.getMonth() + 1); return months[d.getMonth()] + ' ' + d.getDate(); }
  if (c.includes('every 6') || c.includes('6 month')) { d.setMonth(d.getMonth() + 1); return months[d.getMonth()] + ' 2026'; }
  if (c.includes('yearly') || c.includes('year') || c.includes('annual')) { d.setMonth(d.getMonth() + 1); return months[d.getMonth()] + ' 2027'; }
  if (c.includes('seasonal') || c.includes('spring') || c.includes('autumn') || c.includes('october') || c.includes('november')) { return 'next season'; }
  return months[(now.getMonth() + 1) % 12] + ' 2026';
}

function svgCheck() {
  return '<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5L4.5 9L10 3"/></svg>';
}

    html += '<div style="font-size:10px;color:var(--mid);font-style:italic;flex:1;">Ask nudgii about this task...</div>';
    html += '</div>';

    html += '</div></div>';
    html += '</div>';
  });

  // Good to know
  html += '<div class="sec-head"><div class="sec-title">Good to know</div></div>';
  html += '<div style="padding:0 16px 16px;">';
  html += '<div style="background:var(--surface-low);border-radius:12px;border:0.5px solid rgba(44,40,36,0.06);overflow:hidden;">';
  html += '<div style="display:flex;gap:14px;padding:14px;border-bottom:0.5px solid rgba(44,40,36,0.04);">';
  html += '<div style="flex-shrink:0;width:52px;text-align:right;font-family:DM Serif Display,Georgia,serif;font-size:18px;font-weight:400;line-height:1;color:' + cat.color + ';">' + item.tasks.length + '</div>';
  html += '<div style="flex:1;padding-top:1px;"><div style="font-size:11px;font-weight:500;color:var(--ink);">Maintenance tasks</div><div style="font-size:10px;color:var(--mid);margin-top:3px;line-height:1.5;">nudgii tracks ' + item.tasks.length + ' tasks for your ' + item.name.toLowerCase() + '. Each with its own schedule and reminders.</div></div>';
  html += '</div>';
  html += '<div style="display:flex;gap:14px;padding:14px;">';
  html += '<div style="flex-shrink:0;width:52px;text-align:right;font-family:DM Serif Display,Georgia,serif;font-size:18px;font-weight:400;line-height:1;color:var(--apricot);">BE</div>';
  html += '<div style="flex:1;padding-top:1px;"><div style="font-size:11px;font-weight:500;color:var(--ink);">Belgium market</div><div style="font-size:10px;color:var(--mid);margin-top:3px;line-height:1.5;">Costs, regulations, and seasonal timing adapted for Belgium and the Netherlands.</div></div>';
  html += '</div></div></div>';

  // Recent activity
  html += '<div class="sec-head"><div class="sec-title">Recent activity</div></div>';
  html += '<div style="margin:0 16px 8px;background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:14px;text-align:center;">';
  html += '<div style="font-size:11px;color:var(--hint);font-style:italic;">No activity yet. Complete a task to see your history.</div>';
  html += '</div>';

  // Documents (for categories that typically have them)
  if (['home', 'vehicle', 'subscriptions'].includes(item.cat)) {
    html += '<div class="sec-head"><div class="sec-title">Documents</div><div class="sec-action"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="var(--plum)" stroke-width="1.5" stroke-linecap="round"><path d="M6 1v10"/><path d="M1 6h10"/></svg> Add</div></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px;">';
    if (item.cat === 'vehicle') {
      html += '<div style="background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:12px;text-align:center;"><div style="width:100%;aspect-ratio:3/4;background:' + cat.wash + ';border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + cat.color + '" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div style="font-size:10px;font-weight:500;color:var(--ink);">Insurance</div></div>';
      html += '<div style="background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:12px;text-align:center;"><div style="width:100%;aspect-ratio:3/4;background:rgba(140,155,128,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--sage)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div style="font-size:10px;font-weight:500;color:var(--ink);">MOT cert</div></div>';
    } else if (item.cat === 'subscriptions') {
      html += '<div style="background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:12px;text-align:center;"><div style="width:100%;aspect-ratio:3/4;background:' + cat.wash + ';border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + cat.color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div style="font-size:10px;font-weight:500;color:var(--ink);">Policy</div></div>';
      html += '<div style="background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:12px;text-align:center;"><div style="width:100%;aspect-ratio:3/4;background:var(--apricot-wash);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--apricot)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/></svg></div><div style="font-size:10px;font-weight:500;color:var(--ink);">Last invoice</div></div>';
    } else {
      html += '<div style="background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:12px;text-align:center;"><div style="width:100%;aspect-ratio:3/4;background:' + cat.wash + ';border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + cat.color + '" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div style="font-size:10px;font-weight:500;color:var(--ink);">Warranty</div></div>';
      html += '<div style="background:var(--surface);border:0.5px solid rgba(44,40,36,0.06);border-radius:12px;padding:12px;text-align:center;"><div style="width:100%;aspect-ratio:3/4;background:var(--apricot-wash);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--apricot)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div style="font-size:10px;font-weight:500;color:var(--ink);">Service cert</div></div>';
    }
    html += '</div>';
  }

  // Details card
  html += '<div class="sec-head"><div class="sec-title">Details</div><div class="sec-action">Edit</div></div>';
  html += '<div class="detail-card">';
  html += '<div class="detail-row2"><span style="font-size:10px;color:var(--mid);">Category</span><span style="font-size:10px;font-weight:500;color:var(--ink);">' + cat.label + '</span></div>';
  html += '<div class="detail-row2"><span style="font-size:10px;color:var(--mid);">Tasks</span><span style="font-size:10px;font-weight:500;color:var(--ink);">' + item.tasks.length + ' active</span></div>';
  if (item.nickname && item.nickname !== '(none)' && !item.nickname.startsWith('(')) {
    html += '<div class="detail-row2"><span style="font-size:10px;color:var(--mid);">Nickname</span><span style="font-size:10px;font-weight:500;color:var(--plum);">' + item.nickname + '</span></div>';
  }
  if (item.monthlyCost) {
    html += '<div class="detail-row2"><span style="font-size:10px;color:var(--mid);">Monthly cost</span><span style="font-size:10px;font-weight:500;color:var(--ink);">' + item.monthlyCost + '</span></div>';
  }
  html += '</div>';

  html += '<div class="bottom-spacer"></div>';
  el.innerHTML = html;
  el.scrollTop = 0;
}

function toggleTask(id) {
  var card = document.getElementById(id);
  if (!card) return;
  var expand = card.querySelector('.task-expand');
  var chev = card.querySelector('.task-chev');
  if (expand.style.maxHeight && expand.style.maxHeight !== '0px') {
    expand.style.maxHeight = '0px';
    chev.classList.remove('open');
  } else {
    expand.style.maxHeight = expand.scrollHeight + 'px';
    chev.classList.add('open');
  }
}

// ── Init ──
buildSidebar();
selectItem(0);
</script>
