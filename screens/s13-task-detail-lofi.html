<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>nudgii · S-13 Task detail — lo-fi nudge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--ink:#1A1612;--cta:#9B7FD4;--ap:#E8A87C;--ap-dk:#C8784A;--terra:#C4503A;--mid:#8A8070;--mid-lt:#B0A898;--plum:#2D1F4A;--ink-08:rgba(26,22,18,0.08);--ink-12:rgba(26,22,18,0.12);--ink-20:rgba(26,22,18,0.20)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px}
nav{background:var(--cream);border-bottom:1px solid var(--ink-12);padding:0 32px;display:flex;align-items:center;gap:16px;height:48px;position:sticky;top:0;z-index:100}
.nav-back{font-size:13px;color:var(--mid);text-decoration:none}

.nav-sep{color:var(--ink-12);font-size:13px}
.nav-title{font-size:13px;font-weight:500}
.nav-id{margin-left:auto;font-size:10px;font-weight:500;letter-spacing:1.4px;text-transform:uppercase;color:var(--mid-lt);font-family:monospace}
.content{padding:32px;max-width:960px;margin:0 auto}
h1{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px}
.sub{font-size:14px;color:var(--mid);margin-bottom:8px}
.meta{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.meta-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px;border:1px solid var(--ink-12);color:var(--mid)}
.meta-pill.phase{background:rgba(155,127,212,0.08);color:#5C3E8A;border-color:rgba(155,127,212,0.2)}
.meta-pill.status{background:rgba(232,168,124,0.10);color:#7A4A1A;border-color:rgba(232,168,124,0.2)}
.controls{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.btn{font-size:12px;font-weight:500;padding:7px 16px;border-radius:100px;border:1px solid var(--ink-12);background:#fff;color:var(--mid);cursor:pointer;transition:all .15s}
.btn.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.layout{display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap}
/* phone frame */
.phone{width:295px;flex-shrink:0;background:#ddd9d0;border-radius:28px;padding:14px;border:2px solid rgba(26,22,18,0.15)}
.screen{background:#fff;border-radius:16px;overflow:hidden;min-height:530px}
/* annotations */
.ann-col{flex:1;min-width:260px}
.ann-head{font-size:10px;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;color:var(--mid);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--ink-12)}
.ann{display:flex;gap:12px;margin-bottom:16px}
.ann-n{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--cream);font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ann-n.warn{background:var(--terra)}
.ann-body .t{font-size:13px;font-weight:500;margin-bottom:2px}
.ann-body .d{font-size:12px;color:var(--mid);line-height:1.55}
.box{background:#fff;border-radius:10px;padding:14px;margin-top:20px}
.box.decision{border:1px solid rgba(196,80,58,0.18)}
.box.locked{border:1px solid var(--ink-12)}
.box-label{font-size:10px;font-weight:500;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:8px}
.box.decision .box-label{color:var(--terra)}
.box.locked .box-label{color:var(--mid)}
.box p{font-size:12px;color:var(--mid);line-height:1.55;margin-bottom:5px}
.box p:last-child{margin:0}
.box .rec{color:var(--ap-dk);font-weight:500}
/* wireframe atoms */
.wbar{height:42px;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:1px solid var(--ink-08)}
.wback{width:20px;height:20px;background:var(--ink-08);border-radius:4px}
.wtitle{flex:1;height:10px;background:var(--ink-12);border-radius:2px}
.wicon{width:20px;height:20px;background:var(--ink-08);border-radius:4px}
.wsec{padding:14px 14px 0}
.wlabel{height:8px;border-radius:2px;background:var(--ink-08);margin-bottom:5px}
.wline{height:10px;border-radius:2px;background:var(--ink-12);margin-bottom:4px}
.wdiv{height:1px;background:var(--ink-08);margin:12px 14px 0}
.wrow{display:flex;align-items:center;gap:10px;padding:10px 14px 0}
.wrowicon{width:18px;height:18px;background:var(--ink-08);border-radius:4px;flex-shrink:0}
.wrowbody{flex:1}
.wchev{width:8px;height:8px;background:var(--ink-08);border-radius:1px;flex-shrink:0}
.wtags{display:flex;gap:6px;padding:10px 14px 0}
.wtag{height:20px;min-width:50px;border-radius:10px;border:1px solid var(--ink-12)}
.wctas{display:flex;gap:8px;padding:12px 14px}
.wsnooze{flex:1;height:42px;border-radius:8px;border:1px solid var(--ink-12)}
.wdone{flex:2;height:42px;border-radius:8px;background:var(--ink-12)}
.wlbl{font-size:9px;text-align:center;color:var(--mid-lt);margin-top:3px}
.wchat{margin:0 14px 14px;border:1px solid var(--ink-12);border-radius:8px;padding:10px;background:var(--ink-08)}
.wchat-hint{height:8px;width:70%;background:var(--ink-12);border-radius:2px;margin-bottom:8px}
.winput{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--ink-12);border-radius:6px;height:30px;padding:0 10px}
.wph{flex:1;height:7px;background:var(--ink-08);border-radius:2px}
.wmic{width:16px;height:16px;border-radius:50%;background:var(--ink-12);flex-shrink:0}
.wbubble{border-radius:10px;padding:8px 10px;margin-bottom:6px}
.wbubble.u{background:var(--ink-12);margin-left:28px}
.wbubble.a{background:var(--ink-08);border:1px solid var(--ink-12);margin-right:28px}
.wbl{height:8px;border-radius:2px;background:var(--ink-12);margin-bottom:4px}
.wbl:last-child{margin:0}
.wbubble.a .wbl{background:var(--ink-08)}
.wbanner{margin:12px 14px 0;border-radius:8px;background:var(--ink-08);border:1px solid var(--ink-12);padding:10px;display:flex;align-items:center;gap:10px}
.wck{width:26px;height:26px;border-radius:50%;background:var(--ink-12);flex-shrink:0}
.wbanbody{flex:1}
.wundo{width:38px;height:26px;border-radius:6px;border:1px solid var(--ink-12);flex-shrink:0}
.whistrow{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--ink-08)}
.whistrow:last-child{border:none}
.whistdot{width:6px;height:6px;border-radius:50%;background:var(--ink-12);flex-shrink:0}
.st{display:none}.st.on{display:block}
</style>
</head>
<body>
<nav>
  <a class="nav-back" href="../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--mid)"><svg width="20" height="20" viewBox="0 0 80 80" style="border-radius:5px;flex-shrink:0"><rect width="80" height="80" fill="#2D1F4A" rx="18"/><rect x="15" y="12" width="19" height="52" rx="9.5" fill="#F5F0E8"/><rect x="40" y="12" width="19" height="52" rx="9.5" fill="#9B7FD4"/><circle cx="57" cy="22" r="7" fill="#E8A87C"/></svg><span style="font-size:13px">Design hub</span></a>
  <span class="nav-sep">/</span>
  <span class="nav-title">S-13 · S-14 — Task detail</span>
  <span class="nav-id">Lo-fi nudge · Phase 2</span>
</nav>
<div class="content">
  <h1>Task detail</h1>
  <p class="sub">S-13 default · S-13 chat active · S-14 done state</p>
  <div class="meta">
    <span class="meta-pill phase">Phase 2 — Lo-fi nudge</span>
    <span class="meta-pill status">In progress — hi-fi next</span>
    <span class="meta-pill">Decision needed: done overlay trigger</span>
  </div>
  <div class="controls">
    <button class="btn on" onclick="show('default',this)">S-13 Default</button>
    <button class="btn" onclick="show('chat',this)">S-13 Chat active</button>
    <button class="btn" onclick="show('done',this)">S-14 Done state</button>
  </div>
  <div class="layout">
    <div class="phone">
      <div class="screen">
        <div class="wbar"><div class="wback"></div><div class="wtitle"></div><div class="wicon"></div></div>
        <div class="st on" id="st-default">
          <div class="wsec" style="padding-bottom:8px">
            <div class="wlabel" style="width:30%;margin-bottom:3px"></div>
            <div class="wline" style="height:15px;width:90%"></div>
            <div class="wline" style="height:15px;width:62%;margin-top:2px"></div>
          </div>
          <div class="wtags"><div class="wtag" style="width:58px"></div><div class="wtag" style="width:72px"></div></div>
          <div class="wdiv"></div>
          <div class="wsec"><div class="wlabel" style="width:28%"></div><div class="wline" style="width:88%"></div><div class="wline" style="width:58%"></div></div>
          <div class="wdiv"></div>
          <div class="wrow"><div class="wrowicon"></div><div class="wrowbody"><div class="wline" style="margin:0;width:84%"></div></div><div class="wchev"></div></div>
          <div style="display:flex;align-items:center;gap:6px;padding:5px 14px 0"><div style="width:7px;height:7px;border-radius:50%;background:var(--ink-08)"></div><div class="wlabel" style="width:36%;margin:0"></div></div>
          <div class="wdiv"></div>
          <div class="wrow" style="padding-bottom:12px"><div class="wrowicon"></div><div class="wrowbody"><div class="wline" style="margin:0 0 4px;width:70%"></div><div class="wlabel" style="margin:0;width:46%"></div></div><div class="wchev"></div></div>
          <div class="wctas">
            <div><div class="wsnooze"></div><div class="wlbl">Snooze</div></div>
            <div style="flex:2"><div class="wdone"></div><div class="wlbl">Mark done</div></div>
          </div>
          <div class="wchat"><div class="wchat-hint"></div><div class="winput"><div class="wph"></div><div class="wmic"></div></div></div>
        </div>
        <div class="st" id="st-chat">
          <div class="wsec" style="padding-bottom:8px">
            <div class="wlabel" style="width:30%;margin-bottom:3px"></div>
            <div class="wline" style="height:15px;width:90%"></div>
          </div>
          <div class="wdiv"></div>
          <div style="padding:12px 14px 4px">
            <div class="wbubble a"><div class="wbl" style="width:88%"></div><div class="wbl" style="width:66%"></div></div>
            <div class="wbubble u"><div class="wbl" style="width:74%"></div></div>
            <div class="wbubble a"><div class="wbl" style="width:90%"></div><div class="wbl" style="width:78%"></div><div class="wbl" style="width:46%"></div></div>
          </div>
          <div class="wctas">
            <div><div class="wsnooze"></div><div class="wlbl">Snooze</div></div>
            <div style="flex:2"><div class="wdone"></div><div class="wlbl">Mark done</div></div>
          </div>
          <div class="wchat" style="border-color:var(--ink-20)"><div class="winput" style="border-color:var(--ink-20)"><div class="wph"></div><div class="wmic"></div></div></div>
        </div>
        <div class="st" id="st-done">
          <div class="wsec" style="padding-bottom:8px;opacity:0.35">
            <div class="wlabel" style="width:30%;margin-bottom:3px"></div>
            <div class="wline" style="height:15px;width:90%"></div>
            <div class="wline" style="height:15px;width:62%;margin-top:2px"></div>
          </div>
          <div class="wdiv"></div>
          <div class="wbanner"><div class="wck"></div><div class="wbanbody"><div class="wline" style="margin:0 0 4px;width:76%"></div><div class="wlabel" style="margin:0;width:50%"></div></div><div class="wundo"></div></div>
          <div class="wsec"><div class="wlabel" style="width:36%;margin-bottom:8px"></div></div>
          <div class="whistrow"><div class="whistdot"></div><div class="wline" style="flex:1;margin:0 0 0 4px"></div><div class="wlabel" style="width:20%;margin:0 0 0 8px"></div></div>
          <div class="whistrow"><div class="whistdot"></div><div class="wline" style="flex:1;margin:0 0 0 4px"></div><div class="wlabel" style="width:20%;margin:0 0 0 8px"></div></div>
          <div class="whistrow"><div class="whistdot"></div><div class="wline" style="flex:1;margin:0 0 0 4px"></div><div class="wlabel" style="width:20%;margin:0 0 0 8px"></div></div>
          <div style="padding:14px"><div style="height:42px;border-radius:8px;background:var(--ink-12)"></div><div class="wlbl" style="margin-top:4px">Back to dashboard</div></div>
        </div>
      </div>
    </div>
    <div class="ann-col" id="ann"></div>
  </div>
</div>
<script>
const A={
  default:[
    {n:1,t:'Nav bar',d:'Back arrow · task title (truncated to 1 line) · overflow (…) for delete / edit item'},
    {n:2,t:'Task identity',d:'Item chip (e.g. "Vaatwasser") + task name in up to 2 lines. Largest text on screen. Sets context immediately.'},
    {n:3,t:'Why it matters',d:'Single sentence. Always visible — never collapsed. This is the trust moment that justifies the user\'s time.'},
    {n:4,t:'How to do it',d:'Expandable row. Collapsed by default — keeps screen short on first open. Chevron signals there\'s more.'},
    {n:5,t:'Last completed',d:'Expandable. Shows "Never" or relative date. Expands inline to history list (S-16 lives here — not a separate screen).'},
    {n:6,t:'CTA bar',d:'Snooze (1/3 width) · Mark done (2/3 width). Always pinned above chat zone. Width ratio signals priority.'},
    {n:7,t:'AI chat entry',d:'Collapsed by default. Tap input to activate chat state. Mic icon always present for voice input.'},
  ],
  chat:[
    {n:1,t:'Task header stays',d:'Item chip and task name remain visible throughout the conversation. User always knows what they\'re asking about.'},
    {n:2,t:'Chat takes over body',d:'Chat bubbles replace why/how/history rows. Max 40% screen height per UX spec §3, then scrolls.'},
    {n:3,t:'CTAs persist',d:'Snooze and Mark done stay pinned. User can act without closing the conversation.'},
    {n:4,t:'Input stays focused',d:'Keyboard up, cursor in field. Mic icon always visible for switching to voice.'},
    {n:'↳',t:'Session model (MVP)',d:'Chat resets when user navigates away. No persistent history per UX spec §5.2. Revisit post-launch.'},
  ],
  done:[
    {n:1,t:'Task dimmed',d:'Header fades to ~35% opacity. Strikethrough applied to task name in hi-fi version.'},
    {n:2,t:'Completion banner',d:'Check icon · "Done on [date]" · Undo button. Undo window: ~5 seconds. Reverses mark-done with no animation.'},
    {n:3,t:'History auto-expands',d:'History section reveals immediately on mark-done — no extra tap. User sees their track record straight away.'},
    {n:4,t:'CTA changes',d:'Snooze + Mark done replaced by single "Back to dashboard". Prevents accidental double-completion.'},
  ],
};
const D={
  default:`<div class="box locked"><div class="box-label">Layout decisions locked</div><p>S-16 (completion history) lives inline as an expandable row on this screen — not a separate navigation level. 1–5 date entries don't warrant a new screen.</p><p>Why it matters = always visible. Instructions = collapsed by default. These two decisions define the information hierarchy of the screen.</p></div>`,
  chat:``,
  done:`<div class="box decision"><div class="box-label">Open decision — resolve before hi-fi</div><p>Does the full-screen plum done overlay (S-11) fire from this mark-done CTA, or only from the dashboard swipe-to-complete?</p><p class="rec">Recommendation: dashboard swipe only. Task detail gets the quieter in-screen banner shown here. Affects S-11, S-13, S-14.</p></div>`,
};
const LABELS={default:'S-13 Default',chat:'S-13 Chat active',done:'S-14 Done state'};
function show(s,btn){
  document.querySelectorAll('.st').forEach(el=>el.classList.remove('on'));
  document.getElementById('st-'+s).classList.add('on');
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('ann').innerHTML=
    `<div class="ann-head">Annotations — ${LABELS[s]}</div>`+
    A[s].map(a=>`<div class="ann"><div class="ann-n">${a.n}</div><div class="ann-body"><div class="t">${a.t}</div><div class="d">${a.d}</div></div></div>`).join('')+
    D[s];
}
show('default',document.querySelector('.btn'));
</script>
</body>
</html>
